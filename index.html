<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="description" content="חכמוני — משחק לימוד מחשב לילדים בני 4–6">
  <title>חכמוני 🦉</title>

  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#FFCE10">

  <!-- Self-hosted fonts (no Google CDN ping) -->
  <link rel="stylesheet" href="assets/fonts/fonts.css">

  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/components.css">

  <script>
    // Register Service Worker for offline play (after first load).
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err =>
          console.warn('[sw] register failed:', err));
      });
    }
  </script>
</head>
<body>
  <noscript>
    <div class="noscript-message">
      <h1>חכמוני זקוק ל-JavaScript</h1>
      <p>נא הפעל JavaScript בדפדפן כדי לשחק.</p>
    </div>
  </noscript>
  <div id="app"></div>
  <script>
    // Detect file:// — ES modules need a server. Show helpful message.
    if (location.protocol === 'file:') {
      document.addEventListener('DOMContentLoaded', function () {
        var app = document.getElementById('app');
        if (!app) return;
        app.replaceChildren();
        var box = document.createElement('div');
        box.style.cssText = 'padding:40px;max-width:640px;margin:80px auto;text-align:center;background:#FFFCF2;border-radius:24px;box-shadow:0 8px 24px rgba(0,0,0,.1);';
        var h = document.createElement('h1');
        h.style.cssText = 'font-family:"Varela Round",sans-serif;font-size:48px;color:#B91C1C;margin:0 0 16px;';
        h.textContent = 'אופס! צריך להפעיל את השרת';
        var p = document.createElement('p');
        p.style.cssText = 'font-size:20px;color:#2D2A26;line-height:1.6;margin:0 0 20px;';
        p.textContent = 'חכמוני לא יכול לרוץ ישירות מקובץ. הפעל את ה-launcher בשורת PowerShell:';
        var code = document.createElement('pre');
        code.style.cssText = 'background:#2D2A26;color:#FFFCF2;padding:16px;border-radius:12px;font-size:14px;text-align:left;direction:ltr;overflow-x:auto;';
        code.textContent = 'powershell -File scripts\\start-chachmoni.ps1';
        var p2 = document.createElement('p');
        p2.style.cssText = 'font-size:16px;color:#666;margin-top:16px;';
        p2.textContent = 'השרת ייפתח את חכמוני אוטומטית ב-Chrome על http://127.0.0.1:8080';
        box.append(h, p, code, p2);
        app.append(box);
      });
    }
  </script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
